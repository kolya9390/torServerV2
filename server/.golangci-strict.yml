# golangci-lint strict configuration for TorrServer
# Version: 2.x compatible

version: "2"

run:
  timeout: 10m
  tests: true
  allow-parallel-runners: true
  allow-serial-runners: true

linters:
  default: standard

  enable:
    - errcheck
    - gosec
    - staticcheck
    - govet
    - ineffassign
    - unconvert
    - gocognit
    - gocyclo
    - funlen
    - nestif
    - misspell
    - whitespace
    - wsl
    - nlreturn
    - gomoddirectives
    - godox
    - godot
    - prealloc
    - perfsprint
    - revive
    - varnamelen
    - recvcheck
    - copyloopvar
    - usestdlibvars
    - intrange
    - lll

  settings:
    lll:
      line-length: 180
      tab-width: 4

    varnamelen:
      max-distance: 20
      min-name-length: 2
      ignore-names:
        - i
        - j
        - k
        - n
        - wg
        - mu
        - err
        - ctx
        - ch
        - fn
        - id
        - ok
        - db
        - ip
        - tr
        - t
        - p
        - d
        - c  # gin handler context (standard convention)
        - f  # range loop variable (standard Go idiom)
        - b  # io.WriterAt data parameter (standard interface)
        - a  # fuse.Attr pointer (standard fuse naming)
        - s  # service receiver (common abbreviation)

    revive:
      rules:
        - name: var-naming
          arguments:
            - ["ID", "API", "HTTP", "JSON", "URL", "DB", "BBolt", "DSLNA", "SSL", "TLS", "IP", "TCP", "UDP", "M3U", "TMDB", "CLI", "DI", "FS", "OS", "HTTPAuth", "WebDAV", "FUSE", "UPNP", "PEX", "DHT", "NAT", "CGO", "RAM", "CPU", "IO", "GB", "MB", "KB", "MS", "NS"]
            - []
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: indent-error-flow
        - name: errorf
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: range
        - name: receiver-naming
        - name: superfluous-else
        - name: unnecessary-stmt
        - name: unreachable-code
        - name: unused-parameter
        - name: unused-receiver
        - name: struct-tag
        - name: constant-logical-expr
        - name: early-return

    gocognit:
      min-complexity: 30

    gocyclo:
      min-complexity: 30

    funlen:
      lines: 100
      statements: 50

    nestif:
      min-complexity: 15

    godot:
      scope: declarations
      capital: true
      period: true
      exclude:
        - "^fixme:"
        - "^todo:"

    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - fmt:.*
        - io/ioutil:^Read.*
        - (*bytes.Buffer).Write
        - (*bytes.Buffer).WriteByte
        - (*bytes.Buffer).WriteRune
        - (*bytes.Buffer).WriteString
        - (*bytes.Buffer).WriteTo
        - (*strings.Builder).Write
        - (*strings.Builder).WriteByte
        - (*strings.Builder).WriteRune
        - (*strings.Builder).WriteString
        - (*strings.Builder).Copy

    gosec:
      excludes:
        - G104
        - G107
        - G115
        - G204
        - G304
        - G402
        - G501
        - G505

    staticcheck:
      checks:
        - "all"
        - "-SA1019"
        - "-SA4000"

    prealloc:
      simple: true
      range-loops: true
      for-loops: true

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling

    rules:
      # Exclude test files from style linters (tests have different style requirements)
      - path: _test\.go
        linters:
          - lll
          - funlen
          - gocognit
          - gocyclo
          - varnamelen
          - revive

      # Exclude revive for test files and mocks (interface implementations require unused params)
      - path: _test\.go
        linters:
          - revive
        text: "unused-parameter|unused-receiver"

      # Exclude revive for mocks (generated/test stubs)
      - path: mocks/
        linters:
          - revive
        text: "unused-parameter|unused-receiver"

      # Exclude revive for noop service implementations (they document interface contracts)
      - linters:
          - revive
        text: "unused-parameter|unused-receiver"
        source: "noop.*Service"

      # Exclude revive for defaults.go noop implementations
      - path: internal/app/apiservices/defaults\.go
        linters:
          - revive
        text: "unused-parameter|unused-receiver"

      # Exclude revive for playback.go noop implementations
      - path: internal/app/apiservices/playback\.go
        linters:
          - revive
        text: "unused-parameter|unused-receiver"

      # Exclude revive for DLNA callback signatures (must match dms.Server interface)
      - path: dlna/
        linters:
          - revive
        text: "unused-parameter|indent-error-flow"

      # Exclude revive for FUSE interface implementations (must match go-fuse API)
      - path: torrfs/
        linters:
          - revive
        text: "unused-parameter|unused-receiver"

      # Exclude revive for PieceFake stub (implements storage.PieceImpl interface)
      - path: torr/storage/torrstor/piecefake\.go
        linters:
          - revive
        text: "unused-parameter"

      # Exclude revive for Storage.OpenTorrent (interface implementation)
      - path: torr/storage/torrstor/storage\.go
        linters:
          - revive
        text: "unused-parameter"

      # Exclude revive for circuitbreaker (interface implementation)
      - path: utils/circuitbreaker/circuitbreaker\.go
        linters:
          - revive
        text: "unused-parameter"

      # Exclude revive for error_middleware (gin middleware signature)
      - path: web/api/error_middleware\.go
        linters:
          - revive
        text: "unused-parameter"

      # Exclude revive for corsService.GetAllowedOrigins (interface implementation)
      - path: web/webinfra/webinfra\.go
        linters:
          - revive
        text: "unused-receiver"

      # Exclude revive for settings methods (interface implementations)
      - path: settings/
        linters:
          - revive
        text: "unused-parameter|unused-receiver"

      # Exclude revive for package naming conflicts with stdlib (existing packages cannot be renamed)
      - linters:
          - revive
        text: "avoid package names that conflict with Go standard library package names"
        path: "log/|metrics/|version/"

      # Exclude revive for meaningless package names (utils is a common Go pattern)
      - linters:
          - revive
        text: "avoid meaningless package names"
        path: "torr/utils/|utils/|tmdb|web/api"

      # Exclude godox for TODO/FIXME comments (these are planning notes)
      - linters:
          - godox
        text: "Line contains TODO/BUG/FIXME"

      # Exclude gomoddirectives for replace directives (needed for fork dependencies)
      - linters:
          - gomoddirectives
        text: "replacement are not allowed"

      # Exclude gosec false positives
      - linters:
          - gosec
        text: "G304|G204|G402"

      # Exclude staticcheck false positives
      - linters:
          - staticcheck
        text: "SA4000"

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
