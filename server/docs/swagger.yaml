basePath: /
definitions:
  server_settings.BTSets:
    properties:
      adaptiveRAMaxMB:
        type: integer
      adaptiveRAMinMB:
        description: |-
          Adaptive read-ahead bounds for streaming readers, in MB.
          0 values fallback to safe defaults.
        type: integer
      cacheSize:
        description: Cache
        format: int64
        type: integer
      connectionsLimit:
        type: integer
      coreProfile:
        description: |-
          CoreProfile controls predefined kernel tuning presets.
          Allowed: custom, low-end, balanced, high-throughput, nas.
        type: string
      disableDHT:
        type: boolean
      disablePEX:
        type: boolean
      disableTCP:
        type: boolean
      disableUPNP:
        type: boolean
      disableUTP:
        type: boolean
      disableUpload:
        type: boolean
      diskSyncIntervalMS:
        description: DiskSyncIntervalMS is used only for "periodic" policy.
        type: integer
      diskSyncPolicy:
        description: |-
          Disk write pipeline controls.
          DiskSyncPolicy: "none" | "periodic" | "always"
        type: string
      diskWriteBatchSize:
        description: DiskWriteBatchSize controls sequential write batching.
        type: integer
      downloadRateLimit:
        description: in kb, 0 - inf
        type: integer
      enableDLNA:
        description: DLNA
        type: boolean
      enableDebug:
        description: debug logs
        type: boolean
      enableIPv6:
        description: BT Config
        type: boolean
      enableProxy:
        description: P2P Proxy
        type: boolean
      enableRutorSearch:
        description: Rutor
        type: boolean
      enableTorznabSearch:
        description: Torznab
        type: boolean
      forceEncrypt:
        description: Torrent
        type: boolean
      friendlyName:
        type: string
      maxConcurrentStreams:
        description: |-
          Stream admission control
          MaxConcurrentStreams: 0 -> auto (2 * GOMAXPROCS), >0 -> fixed limit
        type: integer
      metadataQueueSize:
        description: 'MetadataQueueSize: 0 -> auto (256)'
        type: integer
      metadataWorkers:
        description: |-
          Background metadata finalization worker pool.
          MetadataWorkers: 0 -> auto (max(2, GOMAXPROCS/2))
        type: integer
      peersListenPort:
        type: integer
      preloadCache:
        description: in percent
        type: integer
      preloadQueueSize:
        description: 'PreloadQueueSize: 0 -> auto (32)'
        type: integer
      preloadWorkers:
        description: |-
          Preload worker pool.
          PreloadWorkers: 0 -> auto (1)
        type: integer
      proxyHosts:
        items:
          type: string
        type: array
      readerReadAHead:
        description: in percent, 5%-100%, [...S__X__E...] [S-E] not clean
        type: integer
      removeCacheOnDrop:
        type: boolean
      responsiveMode:
        description: Reader
        type: boolean
      retrackersMode:
        description: 0 - don`t add, 1 - add retrackers (def), 2 - remove retrackers
          3 - replace retrackers
        type: integer
      showFSActiveTorr:
        description: FS
        type: boolean
      sslCert:
        type: string
      sslKey:
        type: string
      sslPort:
        description: HTTPS
        type: integer
      storeSettingsInJSON:
        description: Storage preferences
        type: boolean
      storeViewedInJSON:
        type: boolean
      streamQueueSize:
        description: 'StreamQueueSize: 0 -> auto (2 * effective max streams), >0 ->
          fixed queue limit'
        type: integer
      streamQueueWaitSec:
        description: 'StreamQueueWaitSec: max wait time for queue slot acquisition'
        type: integer
      tmdbsettings:
        allOf:
        - $ref: '#/definitions/settings.TMDBConfig'
        description: TMDB
      torrentDisconnectTimeout:
        description: in seconds
        type: integer
      torrentsSavePath:
        type: string
      torznabUrls:
        items:
          $ref: '#/definitions/settings.TorznabConfig'
        type: array
      uploadRateLimit:
        description: in kb, 0 - inf
        type: integer
      useDisk:
        description: Disk
        type: boolean
      warmDiskCacheSizeMB:
        description: |-
          Warm disk cache (tier-2) controls, in MB/minutes.
          0 values fallback to safe defaults.
        format: int64
        type: integer
      warmDiskCacheTTLMin:
        type: integer
    type: object
  server_settings.Viewed:
    properties:
      file_index:
        type: integer
      hash:
        type: string
    type: object
  server_torr_state.TorrentFileStat:
    properties:
      id:
        type: integer
      length:
        type: integer
      path:
        type: string
    type: object
  server_torr_state.TorrentStat:
    enum:
    - 0
    - 1
    - 2
    - 3
    - 4
    - 5
    type: integer
    x-enum-varnames:
    - TorrentAdded
    - TorrentGettingInfo
    - TorrentPreload
    - TorrentWorking
    - TorrentClosed
    - TorrentInDB
  server_torr_state.TorrentStatus:
    properties:
      active_peers:
        type: integer
      bit_rate:
        type: string
      bytes_read:
        type: integer
      bytes_read_data:
        type: integer
      bytes_read_useful_data:
        type: integer
      bytes_written:
        type: integer
      bytes_written_data:
        type: integer
      category:
        type: string
      chunks_read:
        type: integer
      chunks_read_useful:
        type: integer
      chunks_read_wasted:
        type: integer
      chunks_written:
        type: integer
      connected_seeders:
        type: integer
      data:
        type: string
      download_speed:
        type: number
      duration_seconds:
        type: number
      file_stats:
        items:
          $ref: '#/definitions/server_torr_state.TorrentFileStat'
        type: array
      half_open_peers:
        type: integer
      hash:
        type: string
      loaded_size:
        type: integer
      name:
        type: string
      pending_peers:
        type: integer
      pieces_dirtied_bad:
        type: integer
      pieces_dirtied_good:
        type: integer
      poster:
        type: string
      preload_size:
        type: integer
      preloaded_bytes:
        type: integer
      stat:
        $ref: '#/definitions/server_torr_state.TorrentStat'
      stat_string:
        type: string
      timestamp:
        type: integer
      title:
        type: string
      torrent_size:
        type: integer
      torrs_hash:
        type: string
      total_peers:
        type: integer
      upload_speed:
        type: number
    type: object
  settings.TMDBConfig:
    properties:
      apikey:
        description: TMDB API Key
        type: string
      apiurl:
        description: 'Base API URL (default: https://api.themoviedb.org)'
        type: string
      imageURL:
        description: 'Image URL (default: https://image.tmdb.org)'
        type: string
      imageURLRu:
        description: 'Image URL for Russian users (default: https://imagetmdb.com)'
        type: string
    type: object
  settings.TorznabConfig:
    properties:
      host:
        type: string
      key:
        type: string
      name:
        type: string
    type: object
  torznab.TorrentDetails:
    properties:
      categories:
        items:
          type: string
        type: array
      createDate:
        type: string
      hash:
        type: string
      link:
        type: string
      magnet:
        type: string
      name:
        type: string
      peer:
        type: integer
      seed:
        type: integer
      size:
        type: string
      title:
        type: string
      year:
        type: integer
    type: object
  web_api.cacheReqJS:
    properties:
      action:
        type: string
      hash:
        type: string
    type: object
  web_api.setsReqJS:
    properties:
      action:
        type: string
      sets:
        $ref: '#/definitions/server_settings.BTSets'
    type: object
  web_api.torrReqJS:
    properties:
      action:
        type: string
      category:
        type: string
      data:
        type: string
      hash:
        type: string
      link:
        type: string
      poster:
        type: string
      save_to_db:
        type: boolean
      title:
        type: string
    type: object
  web_api.viewedReqJS:
    properties:
      action:
        type: string
      file_index:
        type: integer
      hash:
        type: string
    type: object
host: localhost:8090
info:
  contact: {}
  description: Minimalist torrent streaming server API.
  title: TorrServer API
  version: "1.0"
paths:
  /cache:
    post:
      description: Return cache stats.
      parameters:
      - description: Cache stats request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web_api.cacheReqJS'
      produces:
      - application/json
      responses:
        "200":
          description: Cache stats
          schema:
            type: object
      summary: Return cache stats
      tags:
      - API
  /download/{size}:
    get:
      description: Download the test file of given size (for speed testing purpose).
      parameters:
      - description: Test file size (in MB)
        in: path
        name: size
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
      summary: Generates test file of given size
      tags:
      - API
  /ffp/{hash}/{id}:
    get:
      description: Gather informations using ffprobe.
      parameters:
      - description: Torrent hash
        in: path
        name: hash
        required: true
        type: string
      - description: File index in torrent
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Data returned from ffprobe
      summary: Gather informations using ffprobe
      tags:
      - API
  /play/{hash}/{id}:
    get:
      description: Play given torrent referenced by infohash and file id.
      parameters:
      - description: Torrent infohash
        in: path
        name: hash
        required: true
        type: string
      - description: File index in torrent
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: Torrent data
      summary: Play given torrent by infohash
      tags:
      - API
  /playlist:
    get:
      description: Get HTTP link of torrent in M3U list.
      parameters:
      - description: Torrent hash
        in: query
        name: hash
        required: true
        type: string
      - description: From last play file
        in: query
        name: fromlast
        type: boolean
      produces:
      - audio/x-mpegurl
      responses:
        "200":
          description: OK
          schema:
            type: file
      summary: Get HTTP link of torrent in M3U list
      tags:
      - API
  /playlistall/all.m3u:
    get:
      description: Retrieve all torrents and generates a bundled M3U playlist.
      produces:
      - audio/x-mpegurl
      responses:
        "200":
          description: OK
          schema:
            type: file
      summary: Get a M3U playlist with all torrents
      tags:
      - API
  /settings:
    post:
      consumes:
      - application/json
      description: Allow to get or set server settings.
      parameters:
      - description: 'Settings request. Available params for action: get, set, def'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web_api.setsReqJS'
      produces:
      - application/json
      responses:
        "200":
          description: Settings JSON or nothing. Depends on what action has been asked.
          schema:
            $ref: '#/definitions/server_settings.BTSets'
      summary: Get / Set server settings
      tags:
      - API
  /shutdown:
    get:
      description: Gracefully shuts down server after 1 second.
      responses:
        "200":
          description: OK
      summary: Shuts down server
      tags:
      - API
  /storage/settings:
    get:
      consumes:
      - application/json
      description: Retrieves the current storage preferences for settings and viewed
        history
      produces:
      - application/json
      responses:
        "200":
          description: Storage preferences
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get storage configuration settings
      tags:
      - API
    post:
      consumes:
      - application/json
      - application/x-www-form-urlencoded
      description: Updates the storage preferences for settings and viewed history.
        Requires application restart for changes to take effect.
      parameters:
      - description: Storage preferences to update
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      - description: Settings storage type
        enum:
        - json
        - bbolt
        in: formData
        name: settings
        type: string
      - description: Viewed history storage type
        enum:
        - json
        - bbolt
        in: formData
        name: viewed
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Update successful
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid input data
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Read-only mode
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Update storage configuration settings
      tags:
      - API
  /stream:
    get:
      description: Multi usage endpoint.
      parameters:
      - description: Magnet/hash/link to torrent
        in: query
        name: link
        required: true
        type: string
      - description: File index in torrent
        in: query
        name: index
        type: string
      - description: Should preload torrent
        in: query
        name: preload
        type: string
      - description: Get statistics from torrent
        in: query
        name: stat
        type: string
      - description: Should save torrent
        in: query
        name: save
        type: string
      - description: Get torrent as M3U playlist
        in: query
        name: m3u
        type: string
      - description: Get M3U from last played file
        in: query
        name: fromlast
        type: string
      - description: Start stream torrent
        in: query
        name: play
        type: string
      - description: Set title of torrent
        in: query
        name: title
        type: string
      - description: Set poster link of torrent
        in: query
        name: poster
        type: string
      - description: 'Set category of torrent, used in web: movie, tv, music, other'
        in: query
        name: category
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: Data returned according to query
      summary: Multi usage endpoint
      tags:
      - API
  /streams/m3u:
    get:
      description: Read-only M3U endpoint. Does not create or modify torrent state.
      parameters:
      - description: Magnet/hash/link to torrent
        in: query
        name: link
        required: true
        type: string
      - description: Start playlist from last viewed file
        in: query
        name: fromlast
        type: string
      produces:
      - audio/x-mpegurl
      responses:
        "200":
          description: OK
          schema:
            type: file
      summary: Get torrent playlist
      tags:
      - API
  /streams/play:
    get:
      description: Command endpoint for streaming torrent file by index.
      parameters:
      - description: Magnet/hash/link to torrent
        in: query
        name: link
        required: true
        type: string
      - description: File index in torrent
        in: query
        name: index
        required: true
        type: string
      - description: Should preload torrent before stream
        in: query
        name: preload
        type: string
      - description: Torrent title
        in: query
        name: title
        type: string
      - description: Poster URL
        in: query
        name: poster
        type: string
      - description: Torrent category
        in: query
        name: category
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: Torrent data
      summary: Play torrent file
      tags:
      - API
  /streams/save:
    post:
      description: Command endpoint that saves torrent metadata without streaming.
      parameters:
      - description: Magnet/hash/link to torrent
        in: query
        name: link
        required: true
        type: string
      - description: Torrent title
        in: query
        name: title
        type: string
      - description: Poster URL
        in: query
        name: poster
        type: string
      - description: Torrent category
        in: query
        name: category
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Save torrent metadata to DB
      tags:
      - API
  /streams/stat:
    get:
      description: Read-only status endpoint. Does not create or modify torrent state.
      parameters:
      - description: Magnet/hash/link to torrent
        in: query
        name: link
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server_torr_state.TorrentStatus'
      summary: Get torrent runtime status
      tags:
      - API
  /tmdb/settings:
    get:
      description: Get TMDB API configuration
      produces:
      - application/json
      responses:
        "200":
          description: TMDB settings
          schema:
            type: object
      summary: Get TMDB settings
      tags:
      - API
  /torrent/upload:
    post:
      consumes:
      - multipart/form-data
      description: Only one file support.
      parameters:
      - description: Torrent file to insert
        in: formData
        name: file
        required: true
        type: file
      - description: Save to DB
        in: formData
        name: save
        type: string
      - description: Torrent title
        in: formData
        name: title
        type: string
      - description: Torrent category
        in: formData
        name: category
        type: string
      - description: Torrent poster
        in: formData
        name: poster
        type: string
      - description: Torrent data
        in: formData
        name: data
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Torrent status
          schema:
            type: object
      summary: Add .torrent file
      tags:
      - API
  /torrents:
    post:
      consumes:
      - application/json
      description: Allow to list, add, remove, get, set, drop, wipe torrents on server.
        The action depends of what has been asked.
      parameters:
      - description: 'Torrent request. Available params: add, get, set, rem, list,
          drop, wipe.'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web_api.torrReqJS'
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Handle torrents informations
      tags:
      - API
  /torznab/search:
    get:
      description: Makes a torznab search.
      parameters:
      - description: Torznab query
        in: query
        name: query
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Torznab torrent search result(s)
          schema:
            items:
              $ref: '#/definitions/torznab.TorrentDetails'
            type: array
      summary: Makes a torznab search
      tags:
      - API
  /viewed:
    post:
      consumes:
      - application/json
      description: Allow to set, list or remove viewed torrents from server.
      parameters:
      - description: 'Viewed torrent request. Available params for action: set, rem,
          list'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web_api.viewedReqJS'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/server_settings.Viewed'
            type: array
      summary: Set / List / Remove viewed torrents
      tags:
      - API
schemes:
- http
swagger: "2.0"
