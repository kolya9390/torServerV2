version: '3.8'

services:
  torrserver:

    build:
      context: .
    container_name: torrserver-light

    # Сеть - используем порты вместо host (для macOS)
    # Для Linux можно раскомментировать network_mode: host для DLNA
    # network_mode: host  # Для DLNA
    ports:
      - "8090:8090"   # HTTP
      # - "8443:8443"   # HTTPS (раскомментировать если нужен)
      # - "6060:6060"   # pprof (только для разработки!)

    # Минимальные переменные
    environment:
      # Основные
      - TS_PORT=8090
      - TS_CONF_PATH=/opt/ts/config
      - TS_TORR_DIR=/opt/ts/torrents
      - TS_LOG_PATH=/opt/ts/log

      # Отключаем лишнее для экономии ресурсов
      - TS_DONTKILL=1

      # DLNA (можно включить)
      # - TS_EN_DLN=1

    # Тома (минимальные)
    volumes:
      - ./config:/opt/ts/config
      - ./torrents:/opt/ts/torrents
      - ./logs:/opt/ts/log

    # Ограничение ресурсов (работает без Swarm)
    mem_limit: 512m
    cpus: 1.0

    # Рестарт
    restart: unless-stopped
    stop_grace_period: 15s

    # Healthcheck
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/healthz"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

    # Логирование
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
