name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: server/go.sum

      - name: Run unit tests
        working-directory: server
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./torr/... ./settings/... ./config/...

      - name: Run E2E tests
        working-directory: server
        run: go test -v -timeout 60s ./e2e/...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: server/coverage.out
          flags: unittests

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: server
          args: --timeout=5m

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [amd64, arm64]
        exclude:
          - os: windows-latest
            arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build
        working-directory: server
        env:
          GOOS: ${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'macos-latest' && 'darwin' || 'windows' }}
          GOARCH: ${{ matrix.arch }}
        run: go build -ldflags '-w -s' -o ../dist/torrserver-${{ matrix.os }}-${{ matrix.arch }} ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: torrserver-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/torrserver-*
