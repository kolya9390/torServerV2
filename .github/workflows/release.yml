name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            binary: torrserver
            ext: ""
          - os: linux
            arch: arm64
            binary: torrserver
            ext: ""
          - os: darwin
            arch: amd64
            binary: torrserver
            ext: ""
          - os: darwin
            arch: arm64
            binary: torrserver
            ext: ""
          - os: windows
            arch: amd64
            binary: torrserver
            ext: ".exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: server/go.sum

      - name: Build binary
        working-directory: server
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags '-w -s -X server/version.version=${{ github.ref_name }}' \
            -o ../dist/torrserver-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} ./cmd

      - name: Create checksum
        working-directory: dist
        run: sha256sum torrserver-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} > torrserver-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: torrserver-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/torrserver-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
          retention-days: 1

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: torrserver-${{ matrix.os }}-${{ matrix.arch }}.sha256
          path: dist/torrserver-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}.sha256
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir release
          for dir in artifacts/torrserver-*; do
            if [[ -d "$dir" ]]; then
              cp "$dir"/* release/
            fi
          done
          ls -la release/

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log "$PREVIOUS_TAG"..HEAD --pretty=format:"* %s (%h)")
          else
            CHANGELOG=$(git log --pretty=format:"* %s (%h)")
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          name: Release ${{ github.ref_name }}
          body: |
            ## TorrServer ${{ github.ref_name }}

            ### Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### Binaries
            | Platform | Architecture |
            |----------|--------------|
            | Linux | amd64, arm64 |
            | macOS | amd64, arm64 |
            | Windows | amd64 |

            ### Docker (GitHub Packages)
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ### Installation
            ```bash
            # Linux
            ./torrserver-linux-amd64

            # macOS
            ./torrserver-darwin-arm64

            # Windows
            .\torrserver-windows-amd64.exe
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
